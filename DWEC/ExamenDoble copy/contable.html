<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libro Contable - THU</title>
    <link rel="stylesheet" href="./css/bootstrap.min.css">
</head>
<body>
    <!-- Navbar (mismo estilo) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">THU</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contable.html">Contable</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenido principal -->
    <div class="container mt-4">
        <h1 class="text-center mb-4">Libro de Apuntes Contables</h1>

        <!-- Tabla de apuntes -->
        <div class="table-responsive">
            <table class="table table-bordered table-striped" id="tablaApuntes">
                <thead class="thead-dark">
                    <tr>
                        <th>Fecha</th>
                        <th>Concepto</th>
                        <th>DEBE / HABER</th>
                        <th>Importe</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Se rellena dinámicamente desde localStorage -->
                </tbody>
            </table>
        </div>

        <!-- Saldo actual -->
        <div class="alert alert-info text-center">
            <strong>Saldo actual: <span id="saldoActual">0.00</span> €</strong>
            <br><small>(Saldo = Suma HABER − Suma DEBE)</small>
        </div>

        <!-- Formulario para añadir nuevo apunte -->
        <div class="card mb-4">
            <div class="card-header">Añadir Apunte</div>
            <div class="card-body">
                <form id="formApunte">
                    <div class="form-row">
                        <div class="form-group col-md-3">
                            <label for="fecha">Fecha</label>
                            <input type="date" id="fecha" class="form-control" required>
                        </div>
                        <div class="form-group col-md-4">
                            <label for="concepto">Concepto</label>
                            <input type="text" id="concepto" class="form-control" placeholder="Ej. Pago proveedor" required>
                        </div>
                        <div class="form-group col-md-2">
                            <label>Tipo</label><br>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="tipo" id="debe" value="D" required>
                                <label class="form-check-label" for="debe">DEBE</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="tipo" id="haber" value="H">
                                <label class="form-check-label" for="haber">HABER</label>
                            </div>
                        </div>
                        <div class="form-group col-md-2">
                            <label for="importe">Importe</label>
                            <input type="number" id="importe" class="form-control" placeholder="0.00" step="0.01" min="0.01" required>
                        </div>
                        <div class="form-group col-md-1 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary">Añadir</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="./js/jquery-3.7.1.min.js"></script> <!-- no se usa pero por si acaso -->
    <script src="./js/contable.js"></script>
</body>
</html>
