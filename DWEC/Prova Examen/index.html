<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba examen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container-fluid g-0">

        <div class="bg-secondary text-center">
            <div class="row">
                <div class="col-12">
                    <nav class="navbar bg-secondary justify-content-center">
                        <a class="navbar-brand text-white" href="#">Libro Contable</a>
                    </nav>
                </div>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-12 text-center">
                <span class="badge bg-secondary" id="comptador">0 registres</span>
                <button class="btn border-secondary sort-btn actiu" id="btnSortAsc" title="Ordenar per data ascendent">
                    ↑ Data Asc
                </button>
                <button class="btn border-secondary sort-btn" id="btnSortDesc" title="Ordenar per data descendent">
                    ↓ Data Desc
                </button>
            </div>
        </div>

        <div class="row mt-3 justify-content-center">
            <div class="col-11">
                <table class="table table-bordered table-hover table-sm">

                    <thead class="table-secondary">
                        <tr>
                            <th scope="col">Borrar</th>
                            <th scope="col">Fecha</th>
                            <th scope="col">Concepto</th>
                            <th scope="col" class="text-center">D/H</th>
                            <th scope="col" class="text-end">Importe</th>
                            <th scope="col" class="text-end">Saldo</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr class="table-light">
                            <td>
                                <button class="btn btn-sm btn-success" id="btnGrabar">Grabar</button>
                            </td>
                            <td>
                                <input type="date" class="form-control form-control-sm" id="inpFecha" required>
                            </td>
                            <td>
                                <input type="text" class="form-control form-control-sm" id="inpConcepto" placeholder="Concepto..." required maxlength="80">
                            </td>
                            <td>
                                <select class="form-select form-select-sm" id="inpDH" required>
                                    <option value="">--</option>
                                    <option value="D">D</option>
                                    <option value="H">H</option>
                                </select>
                            </td>
                            <td>
                                <input type="number" class="form-control form-control-sm text-end" id="inpImporte" placeholder="0.00" step="0.01" min="0.01" required>
                            </td>
                            <td class="text-end fw-bold" id="saldoActual">0.00</td>
                        </tr>
                    </tbody>

                    <tbody id="cuerpoTabla">
                    </tbody>

                </table>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
